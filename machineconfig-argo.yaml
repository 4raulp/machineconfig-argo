apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 61-master-swissre
  labels:
    machineconfiguration.openshift.io/role: master
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true,Validate=false
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - path: /etc/swissre-master
        filesystem: root
        mode: 0444
        overwrite: true
        contents:
          source: https://raw.githubusercontent.com/anishrana2001/Openshift/refs/heads/main/README.md
